<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشتل الذكي - النباتات المزروعة</title>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #40916c;
            --gold: #d4a373;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f2; margin: 0; padding: 0; overflow-x: hidden; }

        /* زر البرغر العائم */
        .burger-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1003;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .burger-btn:hover { background-color: var(--accent); transform: scale(1.1); }

        /* Sidebar Menu */
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 1002; top: 0; right: 0;
            background-color: var(--primary); overflow-x: hidden; transition: 0.5s; padding-top: 60px;
            box-shadow: -2px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar a { padding: 15px 32px; text-decoration: none; font-size: 20px; color: white; display: block; transition: 0.3s; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar a:hover { background: var(--accent); color: var(--gold); padding-right: 40px; }
        .sidebar .close-btn { position: absolute; top: 10px; left: 25px; font-size: 36px; color: white; cursor: pointer; }

        /* Header */
        .header { 
            background-image: linear-gradient(rgba(27, 67, 50, 0.7), rgba(27, 67, 50, 0.7)), 
                              url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover; background-position: center; color: white; text-align: center; 
            padding: 80px 20px; border-bottom: 5px solid var(--gold);
        }
        .header h1 { margin: 0; font-size: 2.8em; }

        /* Grid & Cards */
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .section-title { color: var(--primary); border-right: 5px solid var(--gold); padding-right: 15px; margin: 40px 0 20px; font-size: 1.8em; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { 
            background: white; border-radius: 15px; overflow: hidden; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; text-align: center; }
        .btn-more { background: var(--accent); color: white; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-top: 10px; font-size: 0.9em; }

        /* Modal Structure */
        .modal {
            display: none; position: fixed; z-index: 1004; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto;
        }
        .modal-content {
            background: white; margin: 5% auto; padding: 30px; border-radius: 20px;
            width: 85%; max-width: 700px; position: relative; animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close { position: absolute; left: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #888; }
        .modal-header { color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; font-size: 1.8em; }
        .detail-row { margin-bottom: 12px; padding: 12px; background: #f9f9f9; border-radius: 10px; border-right: 4px solid var(--accent); }
        .detail-label { font-weight: bold; color: var(--primary); display: block; margin-bottom: 5px; }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<button class="burger-btn" onclick="openNav()">☰</button>

<div id="mySidebar" class="sidebar">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <a href="index.html">🏠 الصفحة الرئيسية</a>
    <a href="plants.html">🌿 النباتات المزروعة</a>
    <a href="components.html">⚙️ المكونات الإلكترونية</a>
    <a href="circuit.html">⚡ الدارة الكهربائية</a>
    <a href="team.html">👨‍💻 فريق الإنجاز</a>
</div>

<div class="header">
    <h1>🌿 النباتات المزروعة</h1>
</div>

<div class="container">
    <h2 class="section-title">دليل النباتات</h2>
    <div class="grid" id="plantGrid">
        </div>
</div>

<div id="plantModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalData"></div>
    </div>
</div>

<footer>
    &copy; 2026 مشروع المشتل الذكي - ثانوية لالة خديجة التقنية
</footer>

<script>
    // قاعدة بيانات النباتات (تأكد من وضع روابط الصور الصحيحة)
    const plants = [
        {
            name: "الكركدية (Hibiscus)",
            img: "images/فوائد_عشبة_الكركدية.jpg",
            origin: "المناطق الاستوائية والشبه استوائية.",
            light: "تحتاج أشعة شمس مباشرة وقوية (6-8 ساعات يومياً).",
            water: "ري منتظم وكثيف في الصيف، مع تجنب غمر الجذور بالماء.",
            soil: "تربة غنية بالمواد العضوية، جيدة التصريف وحامضية قليلاً.",
            temp: "ما بين 15°C و 32°C. لا تتحمل الصقيع.",
            notes: "تستخدم أزهارها في صناعة الشاي الصحي وتعتبر رمزاً للجمال الاستوائي."
        },
        {
            name: "السرخس (Fern)",
            img: "images/paporotnik.jpg",
            origin: "الغابات المطيرة والأماكن الرطبة والمظللة.",
            light: "إضاءة خفيفة إلى متوسطة (ظل جزئي)، بعيداً عن الشمس المباشرة.",
            water: "تحتاج رطوبة عالية؛ يجب رش الأوراق بالماء والحفاظ على التربة رطبة.",
            soil: "تربة غنية بالبيت موس (Peat Moss) تحتفظ بالرطوبة.",
            temp: "ما بين 18°C و 24°C.",
            notes: "تعتبر من منقيات الهواء الطبيعية الممتازة داخل المنازل والمشاتل."
        },
        {
            name: "الخزامة (Lavender)",
            img: "images/الخزامة.webp",
            origin: "حوض البحر الأبيض المتوسط.",
            light: "شمس كاملة ومباشرة.",
            water: "ري قليل؛ تتحمل الجفاف الشديد. يجب ترك التربة تجف تماماً بين الريات.",
            soil: "تربة رملية أو جيرية فقيرة، المهم أن تكون جيدة التصريف جداً.",
            temp: "تتحمل البرد والحرارة، لكنها تكره الرطوبة العالية في التربة.",
            notes: "مشهورة برائحتها المهدئة وقدرتها على طرد الحشرات الضارة."
        },
        {
            name: "الصبار",
            img: "images/cactus.jpg",
            origin: "المناطق الصحراوية في المكسيك وجنوب أمريكا.",
            light: "شمس مباشرة قوية جداً.",
            water: "ري متباعد جداً؛ مرة كل 15-20 يوماً في الصيف.",
            soil: "تربة رملية وحصوية تسمح بمرور الماء بسرعة.",
            temp: "تتحمل حتى 45°C.",
            notes: "مثالي للمبتدئين لأنه يتطلب عناية قليلة جداً."
        },
        {
            name: "الدفلة (Oleander)",
            img: "images/OIP.webp",
            origin: "آسيا ومنطقة المتوسط.",
            light: "شمس مباشرة.",
            water: "تتحمل الجفاف بمجرد استقرار جذورها في الأرض.",
            soil: "تنمو في جميع أنواع التربة حتى الفقيرة منها.",
            temp: "تتحمل الظروف المناخية القاسية والرياح.",
            notes: "⚠️ تحذير: نبتة سامة جداً في حال الأكل."
        },
        {
            name: "الجهنمية (Bougainvillea)",
            img: "images/Bougainvillea-flower.jpg",
            origin: "البرازيل والمناطق الاستوائية.",
            light: "تحتاج شمس مباشرة كثيفة لتزهر بغزارة.",
            water: "ري معتدل؛ كثرة الماء تمنع ظهور الأزهار.",
            soil: "تربة جيدة التصريف.",
            temp: "تحب الدفء ولا تتحمل الصقيع.",
            notes: "تمتاز بألوانها القوية وتعتبر من أجمل النباتات المتسلقة."
        },
        {
            name: "الأزولا (Azolla)",
            img: "images/زراعة-الأزولا.jpg",
            origin: "نبات مائي طافي يتواجد في البرك والمستنقعات.",
            light: "ضوء شمس متوسط.",
            water: "تعيش فوق سطح الماء العذب.",
            soil: "تعتمد على الماء الغني بالمغذيات.",
            temp: "بين 15°C و 26°C.",
            notes: "تستخدم كسماد طبيعي للتربة لقدرتها على تثبيت النيتروجين."
        },
        {
            name: "الإيلوديا (Elodea)",
            img: "images/OIP (1).webp",
            origin: "المياه العذبة في أمريكا الشمالية.",
            light: "تحتاج إضاءة جيدة للقيام بعملية التمثيل الضوئي.",
            water: "نبات مغمور بالكامل داخل الماء.",
            soil: "تثبت جذورها في قاع الحوض المائي.",
            temp: "تفضل المياه الباردة (10°C - 20°C).",
            notes: "تعتبر مخبراً حياً لإنتاج الأكسجين داخل الأحواض المائية."
        }
    ];

    const grid = document.getElementById('plantGrid');
    plants.forEach((plant, index) => {
        grid.innerHTML += `
            <div class="card" onclick="openModal(${index})">
                <img src="${plant.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x200?text=${plant.name}'">
                <div class="card-body">
                    <h3 style="color:var(--primary);">${plant.name}</h3>
                    <div class="btn-more">عرض التفاصيل 🔍</div>
                </div>
            </div>
        `;
    });

    function openModal(index) {
        const p = plants[index];
        document.getElementById('modalData').innerHTML = `
            <h1 class="modal-header">${p.name}</h1>
            <img src="${p.img}" style="width:100%; border-radius:15px; margin-bottom:20px; height:250px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/600x300?text=${p.name}'">
            <div class="detail-row"><span class="detail-label">📍 الأصل والبيئة:</span> ${p.origin}</div>
            <div class="detail-row"><span class="detail-label">☀️ الإضاءة المطلوبة:</span> ${p.light}</div>
            <div class="detail-row"><span class="detail-label">💧 نظام الري:</span> ${p.water}</div>
            <div class="detail-row"><span class="detail-label">🌱 نوع التربة:</span> ${p.soil}</div>
            <div class="detail-row"><span class="detail-label">🌡️ درجة الحرارة:</span> ${p.temp}</div>
            <div class="detail-row"><span class="detail-label">💡 ملاحظات:</span> ${p.notes}</div>
        `;
        document.getElementById('plantModal').style.display = "block";
    }

    function closeModal() { document.getElementById('plantModal').style.display = "none"; }
    function openNav() { document.getElementById("mySidebar").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

    window.onclick = function(event) {
        if (event.target == document.getElementById('plantModal')) closeModal();
    }
</script>

</body>
</html>
