<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشتل الذكي | الأصناف النباتية</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Vazirmatn:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5; 
            --tech-blue: #2563eb; 
            --nature-green: #10b981; 
            --secondary: #64748b;
            --card-bg: #f0f2f5;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --text-main: #1e293b;
        }

        /* إعدادات الوضع الداكن */
        [data-theme="dark"] {
            --bg-color: #0b0e14;
            --card-bg: #0b0e14;
            --text-main: #f0f2f5;
            --secondary: #94a3b8;
            --shadow-light: #161b22;
            --shadow-dark: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s, box-shadow 0.3s; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Vazirmatn', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--nature-green); border-radius: 10px; }

        /* الهيدر المطور ليشمل الأزرار */
        header {
            position: sticky; 
            top: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 1200px;
            padding: 15px 40px;
            background: rgba(240, 242, 245, 0.85);
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            z-index: 1100;
            backdrop-filter: blur(12px);
        }

        [data-theme="dark"] header { background: rgba(11, 14, 20, 0.85); }

        .logo { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.5rem; color: var(--tech-blue); }
        .logo span { color: var(--nature-green); font-weight: 800; }

        .nav-container { display: flex; align-items: center; }

        nav a {
            text-decoration: none; color: var(--secondary); margin-right: 25px;
            font-weight: 400; transition: 0.3s;
        }
        nav a:hover { color: var(--tech-blue); }
        nav a.active { color: var(--nature-green); font-weight: 700; }

        /* أزرار التحكم */
        .header-btns { display: flex; gap: 10px; margin-right: 20px; }
        .icon-btn {
            background: var(--bg-color);
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            color: var(--text-main);
            font-size: 1.1rem;
        }
        .burger-btn { display: none; }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; top: 0; left: -280px;
            width: 280px; height: 100%;
            background: var(--bg-color);
            z-index: 2000;
            box-shadow: 10px 0 30px var(--shadow-dark);
            padding: 40px 20px;
            transition: 0.4s ease;
            display: flex; flex-direction: column; gap: 15px;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            text-decoration: none; color: var(--text-main);
            padding: 15px 20px; border-radius: 15px;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; display: none; }

        .page-header { text-align: center; padding: 60px 20px 40px; }
        .page-header h1 { font-size: clamp(2.5rem, 5vw, 3.5rem); color: var(--text-main); margin-bottom: 10px; line-height: 1.2; }
        .page-header h1 mark { background: none; color: var(--nature-green); }
        .page-header p { font-size: 1.2rem; color: var(--secondary); }

        .container { max-width: 1200px; margin: auto; padding: 20px 20px 80px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        
        .card { 
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            transition: 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .card:hover { box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); transform: scale(0.98); }
        
        .card-img-wrapper { 
            overflow: hidden; height: 220px; width: 100%; border-radius: 20px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .card:hover .card-img { transform: scale(1.05); }
        
        .card-body { padding: 20px 10px 10px; text-align: center; display: flex; flex-direction: column; flex-grow: 1;}
        .card-body h3 { color: var(--nature-green); margin-bottom: 15px; font-size: 1.4rem; font-weight: 700; }
        
        .btn-more { 
            background: var(--card-bg); color: var(--secondary); 
            padding: 10px 20px; border-radius: 50px; 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.95rem; font-weight: 700; transition: 0.3s; margin-top: auto;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px); overflow-y: auto;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { opacity: 1; }
        .modal-content {
            background: var(--card-bg); margin: 5% auto; border-radius: 40px;
            width: 90%; max-width: 800px; position: relative; 
            transform: translateY(50px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 20px 20px 40px var(--shadow-dark), -20px -20px 40px var(--shadow-light);
            padding: 30px; border: 1px solid rgba(255,255,255,0.2);
        }
        .modal.show .modal-content { transform: translateY(0); }
        .close { 
            position: absolute; left: 30px; top: 30px; font-size: 24px; 
            background: var(--card-bg); color: var(--secondary); width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            cursor: pointer; z-index: 10; box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }
        .modal-header-img { width: 100%; height: 300px; object-fit: cover; border-radius: 25px; margin-bottom: 25px;}
        .modal-title { color: var(--nature-green); font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; }
        .modal-subtitle { color: var(--secondary); font-size: 1.1rem; margin-bottom: 30px; }

        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .spec-item { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            display: flex; align-items: flex-start; gap: 15px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }
        .spec-icon { 
            font-size: 1.5rem; background: var(--card-bg); color: var(--tech-blue); 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
        }
        .modal-notes { 
            margin-top: 30px; background: var(--card-bg); 
            padding: 20px; border-radius: 20px; color: var(--nature-green); font-weight: 600;
            box-shadow: 5px 5px 15px var(--shadow-dark), -5px -5px 15px var(--shadow-light);
            border-right: 4px solid var(--nature-green);
        }

        footer { text-align: center; padding: 40px; color: var(--secondary); font-size: 0.9rem; }

        @media (max-width: 968px) {
            header { top: 0; width: 100%; border-radius: 0; margin: 0; padding: 15px 20px; }
            nav { display: none; }
            .burger-btn { display: flex; }
            .modal-content { padding: 20px; width: 95%; }
            .close { left: 15px; top: 15px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="logo">SMART<span>NURSERY</span></div>
        <div class="nav-container">
            <nav>
                <a href="index.html">الرئيسية</a>
                <a href="plants.html" class="active">النباتات</a>
                <a href="circuit.html">المخطط</a>
                <a href="components.html">القطع</a>
                <a href="team.html">فريق الإنجاز</a>
            </nav>
            <div class="header-btns">
                <button class="icon-btn" id="theme-toggle">🌙</button>
                <button class="icon-btn burger-btn" id="burger-toggle">☰</button>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <h3 style="text-align: center; color: var(--tech-blue); margin-bottom: 10px;">القائمة</h3>
        <a href="index.html">الرئيسية</a>
        <a href="plants.html">النباتات</a>
        <a href="circuit.html">المخطط</a>
        <a href="components.html">القطع</a>
        <a href="team.html">فريق الإنجاز</a>
    </div>

    <main class="page-header">
        <h1>الأصناف <mark>النباتية</mark></h1>
        <p>دليل بيولوجي متكامل لنباتات المشتل الذكي</p>
    </main>

    <div class="container">
        <div class="grid" id="plantGrid"></div>
    </div>

    <div id="plantModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalData"></div>
        </div>
    </div>

    <footer>© 2026 مشروع المشتل الذكي - ثانوية لالة خديجة التقنية</footer>

<script>
    const plants = [
        {
            name: "الكركدية (Hibiscus)",
            img: "images/فوائد_عشبة_الكركدية.jpg",
            origin: "المناطق الاستوائية والشبه استوائية.",
            light: "تحتاج أشعة شمس مباشرة وقوية (6-8 ساعات يومياً).",
            water: "ري منتظم وكثيف في الصيف، مع تجنب غمر الجذور بالماء.",
            soil: "تربة غنية بالمواد العضوية، جيدة التصريف وحامضية قليلاً.",
            temp: "ما بين 15°C و 32°C. لا تتحمل الصقيع.",
            notes: "تستخدم أزهارها في صناعة الشاي الصحي وتعتبر رمزاً للجمال الاستوائي."
        },
        {
            name: "السرخس (Fern)",
            img: "images/paporotnik.jpg",
            origin: "الغابات المطيرة والأماكن الرطبة والمظللة.",
            light: "إضاءة خفيفة إلى متوسطة (ظل جزئي)، بعيداً عن الشمس المباشرة.",
            water: "تحتاج رطوبة عالية؛ يجب رش الأوراق بالماء والحفاظ على التربة رطبة.",
            soil: "تربة غنية بالبيت موس (Peat Moss) تحتفظ بالرطوبة.",
            temp: "ما بين 18°C و 24°C.",
            notes: "تعتبر من منقيات الهواء الطبيعية الممتازة داخل المنازل والمشاتل."
        },
        {
            name: "الخزامى (Lavender)",
            img: "images/الخزامة.webp",
            origin: "حوض البحر الأبيض المتوسط.",
            light: "شمس كاملة ومباشرة.",
            water: "ري قليل؛ تتحمل الجفاف الشديد. يجب ترك التربة تجف تماماً بين الريات.",
            soil: "تربة رملية أو جيرية فقيرة، المهم أن تكون جيدة التصريف جداً.",
            temp: "تتحمل البرد والحرارة، لكنها تكره الرطوبة العالية في التربة.",
            notes: "مشهورة برائحتها المهدئة وقدرتها على طرد الحشرات الضارة."
        },
        {
            name: "الصبار المستزرع",
            img: "images/cactus.jpg",
            origin: "المناطق الصحراوية في المكسيك وجنوب أمريكا.",
            light: "شمس مباشرة قوية جداً.",
            water: "ري متباعد جداً؛ مرة كل 15-20 يوماً في الصيف.",
            soil: "تربة رملية وحصوية تسمح بمرور الماء بسرعة.",
            temp: "تتحمل حتى 45°C.",
            notes: "مثالي لتجارب الري الذكي المتباعد بفضل قدرته العالية على تخزين المياه."
        },
        {
            name: "الدفلة (Oleander)",
            img: "images/OIP.webp",
            origin: "آسيا ومنطقة المتوسط.",
            light: "شمس مباشرة لتشجيع الإزهار.",
            water: "تتحمل الجفاف بمجرد استقرار جذورها في الأرض.",
            soil: "تنمو في جميع أنواع التربة حتى الفقيرة منها.",
            temp: "تتحمل الظروف المناخية القاسية والرياح.",
            notes: "⚠️ تحذير: نبتة سامة جداً في حال الأكل، تستخدم للزينة الخارجية فقط."
        },
        {
            name: "الجهنمية (Bougainvillea)",
            img: "images/Bougainvillea-flower.jpg",
            origin: "البرازيل والمناطق الاستوائية.",
            light: "تحتاج شمس مباشرة كثيفة لتزهر بغزارة.",
            water: "ري معتدل؛ كثرة الماء تمنع ظهور الأزهار وتزيد الأوراق.",
            soil: "تربة جيدة التصريف.",
            temp: "تحب الدفء ولا تتحمل الصقيع المستمر.",
            notes: "تمتاز بألوانها القوية وتعتبر من أجمل النباتات المتسلقة."
        },
        {
            name: "الأزولا (Azolla)",
            img: "images/زراعة-الأزولا.jpg",
            origin: "نبات مائي طافي يتواجد في البرك والمستنقعات.",
            light: "ضوء شمس متوسط إلى ساطع.",
            water: "تعيش وتتكاثر فوق سطح الماء العذب.",
            soil: "لا تحتاج لتربة، تعتمد على الماء الغني بالمغذيات.",
            temp: "بين 15°C و 26°C.",
            notes: "تستخدم كسماد طبيعي للتربة لقدرتها المذهلة على تثبيت النيتروجين من الجو."
        },
        {
            name: "الإيلوديا (Elodea)",
            img: "images/OIP (1).webp",
            origin: "المياه العذبة في أمريكا الشمالية.",
            light: "تحتاج إضاءة جيدة للقيام بعملية التمثيل الضوئي بفعالية.",
            water: "نبات مغمور بالكامل داخل الماء.",
            soil: "تثبت جذورها في قاع الحوض المائي.",
            temp: "تفضل المياه الباردة والمعتدلة (10°C - 20°C).",
            notes: "تعتبر مخبراً حياً لإنتاج الأكسجين ومراقبة جودة المياه داخل الأحواض المائية."
        }
    ];

    const grid = document.getElementById('plantGrid');
    plants.forEach((plant, index) => {
        grid.innerHTML += `
            <div class="card" onclick="openModal(${index})">
                <div class="card-img-wrapper">
                    <img src="${plant.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x300?text=${encodeURIComponent(plant.name)}'">
                </div>
                <div class="card-body">
                    <h3>${plant.name}</h3>
                    <div class="btn-more">عرض البطاقة <span>&larr;</span></div>
                </div>
            </div>
        `;
    });

    function openModal(index) {
        const p = plants[index];
        const modal = document.getElementById('plantModal');
        document.getElementById('modalData').innerHTML = `
            <img src="${p.img}" class="modal-header-img" onerror="this.src='https://via.placeholder.com/800x400?text=${encodeURIComponent(p.name)}'">
            <div class="modal-body">
                <h1 class="modal-title">${p.name}</h1>
                <div class="modal-subtitle">البطاقة البيولوجية والاحتياجات الزراعية</div>
                <div class="specs-grid">
                    <div class="spec-item"><div class="spec-icon">🌍</div><div class="spec-text"><h4>الموطن</h4><p>${p.origin}</p></div></div>
                    <div class="spec-item"><div class="spec-icon">☀️</div><div class="spec-text"><h4>الإضاءة</h4><p>${p.light}</p></div></div>
                    <div class="spec-item"><div class="spec-icon">💧</div><div class="spec-text"><h4>الري</h4><p>${p.water}</p></div></div>
                    <div class="spec-item"><div class="spec-icon">🌱</div><div class="spec-text"><h4>التربة</h4><p>${p.soil}</p></div></div>
                    <div class="spec-item"><div class="spec-icon">🌡️</div><div class="spec-text"><h4>الحرارة</h4><p>${p.temp}</p></div></div>
                </div>
                <div class="modal-notes"><strong>💡 ملاحظة:</strong> ${p.notes}</div>
            </div>
        `;
        modal.style.display = "block";
        setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal() { 
        const modal = document.getElementById('plantModal');
        modal.classList.remove('show');
        setTimeout(() => modal.style.display = "none", 300);
    }

    // منطق الوضع الليلي
    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
        if (document.documentElement.getAttribute('data-theme') === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
        }
    });

    // منطق القائمة الجانبية
    const burgerBtn = document.getElementById('burger-toggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    function toggleMenu() {
        sidebar.classList.toggle('active');
        overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
    }
    burgerBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
    window.onclick = (e) => { if (e.target == document.getElementById('plantModal')) closeModal(); }
</script>
</body>
</html>
